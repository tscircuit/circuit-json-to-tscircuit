<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" style="background-color: rgb(245, 241, 237)" data-real-to-screen-transform="matrix(198.6754966887,0,0,-198.6754966887,401.3245033113,498.6754966887)" data-software-used-string="@tscircuit/core@0.0.1322"><style>
              .boundary { fill: rgb(245, 241, 237); }
              .schematic-boundary { fill: none; stroke: #fff; }
