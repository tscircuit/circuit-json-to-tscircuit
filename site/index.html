<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circuit JSON → tscircuit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-alt: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --accent: #2563eb;
    --accent-strong: #1d4ed8;
    --accent-contrast: #ffffff;
    --success: #059669;
    --success-bg: #ecfdf5;
    --success-border: #a7f3d0;
    --error: #dc2626;
    --error-bg: #fef2f2;
    --error-border: #fecaca;
    --processing: #d97706;
    --processing-bg: #fffbeb;
    --processing-border: #fde68a;
    --code-bg: #ffffff;
    --code-header: #f6f8fa;
    --code-text: #24292f;
    --code-text-muted: #6e7781;
    --focus-ring: #2563eb;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
  }

  body {
    font-family:
      ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  code {
    font-family: "Fira Code", ui-monospace, monospace;
  }

  /* Top bar */
  .topbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 20px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: none;
    text-decoration: none;
  }

  .brand .badge {
    display: inline-flex;
    align-items: center;
    background: var(--accent);
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    padding: 4px 9px;
    border-radius: 0.4rem;
  }

  .brand .path {
    font-family: "Fira Code", ui-monospace, monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .topbar-spacer {
    flex: 1;
  }

  .status {
    display: none;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 12.5px;
    flex: none;
    white-space: nowrap;
  }

  .status.visible {
    display: flex;
  }

  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status.success {
    background: var(--success-bg);
    color: var(--success);
    border-color: var(--success-border);
  }
  .status.success .dot {
    background: var(--success);
  }

  .status.error {
    background: var(--error-bg);
    color: var(--error);
    border-color: var(--error-border);
  }
  .status.error .dot {
    background: var(--error);
  }

  .status.processing {
    background: var(--processing-bg);
    color: var(--processing);
    border-color: var(--processing-border);
  }
  .status.processing .dot {
    background: var(--processing);
    animation: pulse 1.1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.35;
    }
  }

  button {
    font-family: inherit;
    border: 1px solid transparent;
    border-radius: 0.4rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      transform 0.1s ease,
      background-color 0.15s ease,
      border-color 0.15s ease;
  }

  button:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .btn-convert {
    flex: none;
    padding: 8px 16px;
    font-size: 13px;
    background: var(--accent);
    color: var(--accent-contrast);
  }

  .btn-convert:hover:not(:disabled) {
    background: var(--accent-strong);
  }

  .btn-convert:active:not(:disabled) {
    transform: translateY(1px);
  }

  .btn-convert:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn-clear {
    flex: none;
    padding: 8px 14px;
    font-size: 13px;
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
  }

  .btn-clear:hover {
    color: var(--text);
    border-color: var(--text-muted);
  }

  /* Split layout */
  .split {
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1px minmax(0, 1fr);
    min-height: 0;
  }

  @media (max-width: 860px) {
    .split {
      grid-template-columns: minmax(0, 1fr);
      grid-auto-rows: min-content minmax(320px, 1fr);
      overflow-y: auto;
    }
    .split-divider {
      display: none;
    }
  }

  .split-divider {
    background: var(--border);
  }

  .pane-input {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
    overflow-y: auto;
    min-height: 0;
  }

  .pane-output {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--code-bg);
  }

  .upload-area {
    flex: none;
    border: 1.5px dashed var(--border);
    border-radius: 0.5rem;
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    transition:
      border-color 0.15s ease,
      background-color 0.15s ease;
    background: var(--surface-alt);
  }

  .upload-area:hover,
  .upload-area:focus-visible {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 6%, var(--surface-alt));
  }

  .upload-area.dragover {
    border-color: var(--accent);
    border-style: solid;
    background: color-mix(in srgb, var(--accent) 10%, var(--surface-alt));
  }

  .upload-area:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .upload-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .upload-glyph {
    width: 18px;
    height: 18px;
    color: var(--accent);
    flex: none;
  }

  .upload-text {
    font-size: 13.5px;
    font-weight: 500;
  }

  .upload-hint {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 4px;
    font-family: "Fira Code", ui-monospace, monospace;
  }

  input[type="file"] {
    display: none;
  }

  .divider {
    flex: none;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .paste-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100px;
  }

  .paste-area textarea {
    flex: 1;
    width: 100%;
    resize: none;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    font-size: 12.5px;
    font-family: "Fira Code", ui-monospace, monospace;
    background: var(--surface-alt);
    color: var(--text);
    line-height: 1.5;
  }

  .paste-area textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }

  .paste-area textarea::placeholder {
    color: var(--text-muted);
  }

  .file-info {
    flex: none;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 12px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    font-family: "Fira Code", ui-monospace, monospace;
    font-size: 12.5px;
  }

  .file-info.visible {
    display: flex;
  }

  .file-name {
    color: var(--text);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Output pane */
  .output-header {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 44px;
    background: var(--code-header);
    border-bottom: 1px solid var(--border);
    font-family: "Fira Code", ui-monospace, monospace;
    font-size: 12px;
    color: var(--code-text-muted);
    gap: 10px;
  }

  .output-header .output-filename {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .output-header .header-actions {
    display: flex;
    gap: 8px;
    flex: none;
  }

  .btn-copy,
  .btn-download {
    flex: none;
    background: transparent;
    border: 1px solid color-mix(in srgb, var(--code-text-muted) 45%, transparent);
    color: var(--code-text-muted);
    font-family: "Fira Code", ui-monospace, monospace;
    font-size: 11.5px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 0.35rem;
  }

  .btn-copy:hover,
  .btn-download:hover {
    color: var(--code-text);
    border-color: var(--code-text-muted);
  }

  .btn-download:disabled,
  .btn-copy:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .output-body {
    position: relative;
    flex: 1;
    min-height: 0;
  }

  .shiki-container {
    height: 100%;
    overflow: auto;
  }

  .shiki-container .shiki {
    margin: 0;
    padding: 14px 0;
    font-family: "Fira Code", ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.5;
    background-color: var(--code-bg) !important;
  }

  .shiki-container .shiki code {
    display: block;
    counter-reset: line;
  }

  .shiki-container .shiki .line {
    display: inline-block;
    min-width: 100%;
    padding: 0 16px;
  }

  .shiki-container .shiki .line::before {
    counter-increment: line;
    content: counter(line);
    display: inline-block;
    width: 1.8rem;
    margin-right: 14px;
    text-align: right;
    color: var(--text-muted);
    opacity: 0.5;
    user-select: none;
  }

  .output-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--code-text-muted);
    text-align: center;
    padding: 24px;
  }

  .output-empty svg {
    width: 26px;
    height: 26px;
    opacity: 0.5;
  }

  .output-empty p {
    font-size: 13px;
    max-width: 32ch;
    line-height: 1.5;
  }

  .output-body.has-code .output-empty {
    display: none;
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="https://tscircuit.com" target="_blank" rel="noopener">
      <span class="badge">tscircuit</span>
      <span class="path">circuit-json &rarr; tsx</span>
    </a>

    <div class="topbar-spacer"></div>

    <div class="status" id="status" role="status"><span class="dot"></span><span id="statusText"></span></div>

    <button class="btn-convert" id="convertBtn" disabled>Convert</button>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </div>

  <div class="split">
    <div class="pane-input">
      <div class="upload-area" id="uploadArea" tabindex="0" role="button" aria-label="Upload circuit JSON file">
        <div class="upload-row">
          <svg class="upload-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" />
            <path d="M7 9l5-5 5 5" />
            <path d="M12 4v12" />
          </svg>
          <span class="upload-text">Drop circuit.json or click to browse</span>
        </div>
        <div class="upload-hint">.json</div>
      </div>

      <input type="file" id="fileInput" accept=".json,application/json" />

      <div class="file-info" id="fileInfo">
        <span class="file-name" id="fileName"></span>
        <span class="file-size" id="fileSize"></span>
      </div>

      <div class="divider">or paste JSON</div>

      <div class="paste-area">
        <textarea
          id="pasteArea"
          placeholder='[{"type": "pcb_board", ...}, ...]'
          spellcheck="false"
        ></textarea>
      </div>
    </div>

    <div class="split-divider"></div>

    <div class="pane-output">
      <div class="output-header">
        <span class="output-filename" id="outputFileName">output.tsx</span>
        <div class="header-actions">
          <button class="btn-copy" id="copyBtn" type="button" disabled>Copy</button>
          <button class="btn-download" id="downloadBtn" type="button" disabled>Download</button>
        </div>
      </div>
      <div class="output-body" id="outputBody">
        <div class="shiki-container" id="outputCode"></div>
        <div class="output-empty" id="outputEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4" />
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <path d="M9 9l3 3-3 3" />
          </svg>
          <p>Your generated TSX will appear here after you convert a circuit.</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="main.tsx"></script>
</body>
</html>
